<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наше Побачення!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container" id="invite-screen">
        <h1 class="main-question">Ти підеш зі мною на побачення?</h1>
        <div class="image-container">
            <img id="cat-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ6bm93YXN6Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/9XY4f3FgFTT4QlaYqa/giphy.gif" alt="Котик">
        </div>
        <div class="buttons">
            <button id="yesButton" class="btn-primary">Даа!</button>
            <button id="noButton" class="btn-secondary running-btn">Нє(</button>
        </div>
    </div>

    <div class="container hidden" id="payment-screen">
        <h1 class="animated-text">
            <span>Х</span><span>т</span><span>о</span><span>&nbsp;</span>
            <span>б</span><span>у</span><span>д</span><span>е</span><span>&nbsp;</span>
            <span>п</span><span>л</span><span>а</span><span>т</span><span>и</span><span>т</span><span>и</span><span>?</span>
        </h1>
        <div class="image-container">
            <img id="money-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHNoZnd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o6gY3Y0YxY0YxY0Yx/giphy.gif" alt="Гроші">
        </div>
        <div class="buttons">
            <button id="mePayButton" class="btn-primary">Я!</button>
            <button id="youPayButton" class="btn-secondary running-btn">Ти!</button>
        </div>
    </div>

    <div class="container hidden" id="final-screen">
        <h1 class="main-question">Юхууууу! До зустрічі! ❤️❤️❤️</h1>
        <div class="image-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHRueGZ6bm93YXN6Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3oriO0OEd9QIDdllqo/giphy.gif">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
